blueprint:
  name: Light Smart Control (Adaptive Color Temperature)
  description: >
    Automatically tunes the color temperature (and optionally brightness)
    of every light in your home, based on the **Area** each light is
    assigned to in Home Assistant.


    Instead of creating one automation per room, you assign each Area to a
    room *type* (bedroom, bathroom, living, kitchen, dining, office,
    hallway) once, here. Any light placed in those Areas — including ones
    you add later — is automatically adjusted with the right curve. No
    per-light wiring.


    Lights that are off, lights not in any mapped area, and lights without
    color-temperature support are left alone. The blueprint never turns
    lights on or off.


    Schedule (six daily slots): pre_dawn → morning → midday → afternoon →
    evening → night. Each preset picks sensible Kelvin + brightness values
    per slot. The target Kelvin is clamped to each bulb's reported
    `min_color_temp_kelvin` / `max_color_temp_kelvin`, so mixed hardware
    is handled automatically.


    Required helpers:
      • input_boolean — master enable toggle


  domain: automation
  source_url: https://github.com/andre-sam/light-smart-control/blob/main/light-smart-control.yaml

  input:
    enable_toggle:
      name: Master enable toggle
      description: input_boolean to enable/disable this automation.
      selector:
        entity:
          domain: input_boolean

    # ---------- Area -> room-type mapping ----------
    bedroom_areas:
      name: Bedroom areas
      description: Areas whose lights should follow the Bedroom curve.
      default: []
      selector:
        area:
          multiple: true
    bathroom_areas:
      name: Bathroom areas
      default: []
      selector:
        area:
          multiple: true
    living_areas:
      name: Living / Family room areas
      default: []
      selector:
        area:
          multiple: true
    kitchen_areas:
      name: Kitchen areas
      default: []
      selector:
        area:
          multiple: true
    dining_areas:
      name: Dining room areas
      default: []
      selector:
        area:
          multiple: true
    office_areas:
      name: Office / Study areas
      default: []
      selector:
        area:
          multiple: true
    hallway_areas:
      name: Hallway / Landing areas
      default: []
      selector:
        area:
          multiple: true

    # ---------- Excludes ----------
    excluded_lights:
      name: Excluded lights
      description: >
        Specific `light.*` entities to skip even if they live in a mapped
        area (e.g. RGB scene lamps you don't want auto-tuned).
      default: []
      selector:
        entity:
          domain: light
          multiple: true

    # ---------- Schedule ----------
    pre_dawn_start:
      name: Pre-dawn start
      default: "05:30:00"
      selector:
        time:
    morning_start:
      name: Morning start
      default: "07:00:00"
      selector:
        time:
    midday_start:
      name: Midday start
      default: "10:00:00"
      selector:
        time:
    afternoon_start:
      name: Afternoon start
      default: "14:00:00"
      selector:
        time:
    evening_start:
      name: Evening start
      default: "18:30:00"
      selector:
        time:
    night_start:
      name: Night start
      default: "22:30:00"
      selector:
        time:

    # ---------- Behaviour ----------
    adjust_brightness:
      name: Also adjust brightness
      default: true
      selector:
        boolean:

    transition_seconds:
      name: Transition (seconds)
      default: 2
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: s

    min_change_kelvin:
      name: Minimum Kelvin change to act
      default: 100
      selector:
        number:
          min: 0
          max: 500
          step: 25
          unit_of_measurement: K

    skip_if_recently_changed:
      name: Skip if recently changed (minutes)
      description: >
        If the light was last changed less than N minutes ago (e.g. the
        user grabbed the dimmer), leave it alone. 0 disables the check.
      default: 15
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: min

mode: single
max_exceeded: silent

variables:
  enable_toggle: !input enable_toggle
  excluded_lights: !input excluded_lights
  pre_dawn_start: !input pre_dawn_start
  morning_start: !input morning_start
  midday_start: !input midday_start
  afternoon_start: !input afternoon_start
  evening_start: !input evening_start
  night_start: !input night_start
  adjust_brightness: !input adjust_brightness
  transition_seconds: !input transition_seconds
  min_change_kelvin: !input min_change_kelvin
  skip_if_recently_changed: !input skip_if_recently_changed

  # Room presets: [pre_dawn, morning, midday, afternoon, evening, night]
  # Each value is [Kelvin, brightness%].
  presets:
    bedroom:
      pre_dawn:  [1900, 10]
      morning:   [3000, 60]
      midday:    [3500, 80]
      afternoon: [3000, 70]
      evening:   [2200, 40]
      night:     [1800, 8]
    bathroom:
      pre_dawn:  [2200, 20]
      morning:   [5000, 90]
      midday:    [5000, 100]
      afternoon: [4000, 80]
      evening:   [2400, 50]
      night:     [1800, 15]
    living:
      pre_dawn:  [2000, 15]
      morning:   [3500, 70]
      midday:    [3500, 90]
      afternoon: [3000, 75]
      evening:   [2400, 50]
      night:     [2000, 20]
    kitchen:
      pre_dawn:  [2400, 25]
      morning:   [4000, 90]
      midday:    [4500, 100]
      afternoon: [3500, 85]
      evening:   [2700, 60]
      night:     [2000, 20]
    dining:
      pre_dawn:  [2200, 15]
      morning:   [2700, 60]
      midday:    [2700, 80]
      afternoon: [2700, 70]
      evening:   [2400, 50]
      night:     [2000, 20]
    office:
      pre_dawn:  [3000, 30]
      morning:   [4500, 90]
      midday:    [5000, 100]
      afternoon: [4000, 85]
      evening:   [3000, 60]
      night:     [2200, 25]
    hallway:
      pre_dawn:  [1800, 8]
      morning:   [3000, 60]
      midday:    [3500, 70]
      afternoon: [3000, 60]
      evening:   [2400, 40]
      night:     [1800, 10]

  # Current slot from clock time (handles overnight wrap).
  now_t: "{{ now().strftime('%H:%M:%S') }}"
  slot: >-
    {%- set t = now_t -%}
    {%- if t >= night_start or t < pre_dawn_start -%}night
    {%- elif t >= pre_dawn_start and t < morning_start -%}pre_dawn
    {%- elif t >= morning_start and t < midday_start -%}morning
    {%- elif t >= midday_start and t < afternoon_start -%}midday
    {%- elif t >= afternoon_start and t < evening_start -%}afternoon
    {%- else -%}evening
    {%- endif -%}

  # Area -> room-type mapping driven by the inputs.
  area_to_room:
    bedroom: !input bedroom_areas
    bathroom: !input bathroom_areas
    living: !input living_areas
    kitchen: !input kitchen_areas
    dining: !input dining_areas
    office: !input office_areas
    hallway: !input hallway_areas

  # Build [{entity, room}, ...] from the mapping. Filters out excluded
  # lights, lights without color-temp support, and unavailable lights.
  # Earlier room-type entries win on duplicates.
  targets: >-
    {%- set ns = namespace(out=[], seen=[]) -%}
    {%- for room, areas in area_to_room.items() -%}
      {%- for area in areas -%}
        {%- for e in area_entities(area) -%}
          {%- if e.startswith('light.')
                 and e not in excluded_lights
                 and e not in ns.seen
                 and states(e) not in ['unavailable', 'unknown'] -%}
            {%- set modes = state_attr(e, 'supported_color_modes') or [] -%}
            {%- if 'color_temp' in modes
                   or state_attr(e, 'min_color_temp_kelvin') is not none -%}
              {%- set ns.seen = ns.seen + [e] -%}
              {%- set ns.out = ns.out + [{'entity': e, 'room': room}] -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
    {%- endfor -%}
    {{ ns.out }}

trigger:
  # Steady cadence — also picks up newly turned-on lights within a minute.
  - platform: time_pattern
    minutes: "/1"
  # Re-apply at each slot boundary the moment it ticks over.
  - platform: time
    at:
      - !input pre_dawn_start
      - !input morning_start
      - !input midday_start
      - !input afternoon_start
      - !input evening_start
      - !input night_start

condition:
  - condition: state
    entity_id: !input enable_toggle
    state: "on"

action:
  - repeat:
      for_each: "{{ targets }}"
      sequence:
        - variables:
            ent: "{{ repeat.item.entity }}"
            room: "{{ repeat.item.room }}"
            target_kelvin: "{{ presets[room][slot][0] | int }}"
            target_brightness_pct: "{{ presets[room][slot][1] | int }}"
            is_on: "{{ states(ent) == 'on' }}"
            current_kelvin: >-
              {{ state_attr(ent, 'color_temp_kelvin')
                 | default(state_attr(ent, 'kelvin'), true)
                 | default(0, true) | int(0) }}
            min_k: "{{ state_attr(ent, 'min_color_temp_kelvin') | default(2000, true) | int(2000) }}"
            max_k: "{{ state_attr(ent, 'max_color_temp_kelvin') | default(6500, true) | int(6500) }}"
            clamped_kelvin: "{{ [[target_kelvin, min_k] | max, max_k] | min }}"
            kelvin_delta: "{{ (clamped_kelvin - current_kelvin) | abs }}"
            last_changed_minutes: >-
              {{ ((now() - states[ent.split('.')[0]][ent.split('.')[1]].last_changed)
                  .total_seconds() / 60) | round(0) if is_on else 9999 }}
            recently_touched: >-
              {{ skip_if_recently_changed | int > 0
                 and last_changed_minutes < (skip_if_recently_changed | int) }}
        - choose:
            - conditions:
                - "{{ is_on }}"
                - "{{ not recently_touched }}"
                - "{{ kelvin_delta > (min_change_kelvin | int)
                      or (adjust_brightness and target_brightness_pct > 0) }}"
              sequence:
                - choose:
                    - conditions: "{{ adjust_brightness }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: "{{ ent }}"
                          data:
                            kelvin: "{{ clamped_kelvin }}"
                            brightness_pct: "{{ target_brightness_pct }}"
                            transition: "{{ transition_seconds | int }}"
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ ent }}"
                      data:
                        kelvin: "{{ clamped_kelvin }}"
                        transition: "{{ transition_seconds | int }}"
