blueprint:
  name: Light Smart Control (Adaptive Color Temperature)
  description: >
    Automatically tunes the color temperature (and optionally brightness)
    of every light in your home, based on the **Area** each light is
    assigned to in Home Assistant.


    Instead of creating one automation per room, you assign each Area to a
    room *type* (bedroom, bathroom, living, kitchen, dining, office,
    hallway) once, here. Any light placed in those Areas — including ones
    you add later — is automatically adjusted with the right curve. No
    per-light wiring.


    Lights that are off, lights not in any mapped area, and lights without
    color-temperature support are left alone. The blueprint never turns
    lights on or off.


    Schedule (six daily slots): pre_dawn → morning → midday → afternoon →
    evening → night. Each preset picks sensible Kelvin + brightness values
    per slot. The target Kelvin is clamped to each bulb's reported
    `min_color_temp_kelvin` / `max_color_temp_kelvin`, so mixed hardware
    is handled automatically.


    Required helpers:
      • input_boolean — master enable toggle


  domain: automation
  source_url: https://github.com/andre-sam/light-smart-control/blob/main/light-smart-control.yaml

  input:
    enable_toggle:
      name: Master enable toggle
      description: input_boolean to enable/disable this automation.
      selector:
        entity:
          domain: input_boolean

    # ---------- Area -> room-type mapping ----------
    bedroom_areas:
      name: Bedroom areas
      description: Areas whose lights should follow the Bedroom curve.
      default: []
      selector:
        area:
          multiple: true
    bathroom_areas:
      name: Bathroom areas
      default: []
      selector:
        area:
          multiple: true
    living_areas:
      name: Living / Family room areas
      default: []
      selector:
        area:
          multiple: true
    kitchen_areas:
      name: Kitchen areas
      default: []
      selector:
        area:
          multiple: true
    dining_areas:
      name: Dining room areas
      default: []
      selector:
        area:
          multiple: true
    office_areas:
      name: Office / Study areas
      default: []
      selector:
        area:
          multiple: true
    hallway_areas:
      name: Hallway / Landing areas
      default: []
      selector:
        area:
          multiple: true
    staircase_areas:
      name: Staircase areas
      default: []
      selector:
        area:
          multiple: true
    entry_areas:
      name: Entry / Foyer areas
      default: []
      selector:
        area:
          multiple: true
    laundry_areas:
      name: Laundry areas
      default: []
      selector:
        area:
          multiple: true
    garage_areas:
      name: Garage areas
      default: []
      selector:
        area:
          multiple: true
    front_veranda_areas:
      name: Front veranda areas
      default: []
      selector:
        area:
          multiple: true
    back_veranda_areas:
      name: Back veranda areas
      default: []
      selector:
        area:
          multiple: true
    alfresco_areas:
      name: Alfresco / Deck areas
      default: []
      selector:
        area:
          multiple: true
    front_yard_areas:
      name: Front yard areas
      default: []
      selector:
        area:
          multiple: true
    backyard_areas:
      name: Backyard areas
      default: []
      selector:
        area:
          multiple: true
    pool_areas:
      name: Pool areas
      default: []
      selector:
        area:
          multiple: true
    driveway_areas:
      name: Driveway areas
      default: []
      selector:
        area:
          multiple: true
    shed_areas:
      name: Shed / Workshop areas
      default: []
      selector:
        area:
          multiple: true

    # ---------- Excludes ----------
    excluded_lights:
      name: Excluded lights
      description: >
        Specific `light.*` entities to skip even if they live in a mapped
        area (e.g. RGB scene lamps you don't want auto-tuned).
      default: []
      selector:
        entity:
          domain: light
          multiple: true

    # ---------- Fixture class (downlight / secondary) ----------
    # Each light belongs to a class that determines its BRIGHTNESS curve.
    # Kelvin still follows the per-room curve for both classes.
    #   - downlight: ceiling/recessed task light. Stays bright through
    #     the day, drops only late evening / night.
    #   - secondary: ambient/lamp light. Follows the gentler circadian
    #     wind-down (default behaviour).
    # Class is decided by HA Labels assigned to the light. If a light has
    # neither label, it falls back to `default_class`.
    downlight_label:
      name: "Label for downlights"
      description: >
        HA Label name (or slug) marking lights as downlights / primary
        ceiling lights. Assign this label to every downlight in HA
        (Settings → Areas, Labels & Zones → Labels).
      default: downlight
      selector:
        text:

    secondary_label:
      name: "Label for secondary lights"
      description: >
        HA Label name (or slug) marking lamps / accent / secondary lights.
      default: secondary
      selector:
        text:

    default_class:
      name: Default fixture class
      description: >
        Fallback class for lights that have neither label assigned.
      default: downlight
      selector:
        select:
          options:
            - label: Downlight (flat / task curve)
              value: downlight
            - label: Secondary (ambient / lamp curve)
              value: secondary

    # ---------- Schedule ----------
    # `pre_dawn`, `morning`, `evening` and `night` are always derived
    # from a sun entity (`next_dawn`, `next_rising`, `next_setting`,
    # `next_dusk`) plus per-anchor offsets below, so the schedule
    # shifts with the seasons. `midday` and `afternoon` are clock-based
    # because the sun has no natural anchor for them.
    sun_entity:
      name: Sun entity
      description: >
        The `sun.*` entity to read dawn/sunrise/sunset/dusk from.
        Home Assistant ships with `sun.sun` out of the box — that's
        almost always the right choice. Override only if you maintain
        a custom sun entity (e.g. for a different location).
      default: sun.sun
      selector:
        entity:
          domain: sun

    sun_pre_dawn_offset:
      name: "Sun: pre-dawn offset (min)"
      description: Minutes added to `next_dawn` (negative = earlier).
      default: 0
      selector:
        number: { min: -120, max: 120, step: 5, unit_of_measurement: min }
    sun_morning_offset:
      name: "Sun: morning offset (min)"
      description: Minutes added to sunrise (`next_rising`).
      default: 0
      selector:
        number: { min: -120, max: 120, step: 5, unit_of_measurement: min }
    sun_evening_offset:
      name: "Sun: evening offset (min)"
      description: Minutes added to sunset (`next_setting`). Negative pulls the warm shift earlier.
      default: 0
      selector:
        number: { min: -120, max: 120, step: 5, unit_of_measurement: min }
    sun_night_offset:
      name: "Sun: night offset (min)"
      description: Minutes added to dusk (`next_dusk`). Default +90 = bedtime ~1.5h after dusk.
      default: 90
      selector:
        number: { min: -120, max: 240, step: 5, unit_of_measurement: min }

    # ---------- Seasonal clamps for evening / night BRIGHTNESS ----------
    # IMPORTANT: these clamps apply ONLY to the BRIGHTNESS schedule.
    # Kelvin always tracks the raw sun position (best-practice circadian
    # response — warm light should arrive with sunset regardless of clock).
    # Brightness, however, is a behavioural concern: in Sydney sunset moves
    # ~2.5h between June and December, and without clamps the dim-down
    # starts mid-afternoon in winter (sunset ~17:00) which feels wrong
    # while people are still cooking / having dinner. These four inputs
    # floor and ceiling the BRIGHTNESS evening/night anchors so the
    # wind-down stays at a socially sane hour year-round, while Kelvin
    # continues to follow the sun.
    evening_earliest:
      name: "Evening brightness: earliest clock time"
      description: >
        Sun-derived `evening` anchor for BRIGHTNESS is never earlier
        than this. Kelvin still tracks the raw sun. Use to stop early
        winter sunsets from dimming the house before family dinner time.
      default: "18:00:00"
      selector:
        time:
    evening_latest:
      name: "Evening brightness: latest clock time"
      description: >
        Sun-derived `evening` anchor for BRIGHTNESS is never later
        than this. Caps the start of the brightness wind-down on long
        summer evenings.
      default: "20:00:00"
      selector:
        time:
    night_earliest:
      name: "Night brightness: earliest clock time"
      description: >
        Sun-derived `night` anchor for BRIGHTNESS is never earlier than
        this. Stops the deep dim "bedtime" brightness from triggering
        too early in winter. Kelvin still tracks the raw sun.
      default: "21:30:00"
      selector:
        time:
    night_latest:
      name: "Night brightness: latest clock time"
      description: >
        Sun-derived `night` anchor for BRIGHTNESS is never later than
        this. Caps the bedtime brightness drop to a reasonable hour on
        long summer evenings.
      default: "23:00:00"
      selector:
        time:

    midday_start:
      name: Midday start (clock)
      description: >
        Clock time for the `midday` anchor. The sun has no natural
        anchor here, so this stays clock-based.
      default: "10:00:00"
      selector:
        time:
    afternoon_start:
      name: Afternoon start (clock)
      description: >
        Clock time for the `afternoon` anchor. The sun has no natural
        anchor here, so this stays clock-based.
      default: "14:00:00"
      selector:
        time:

    # ---------- Behaviour ----------
    adjust_brightness:
      name: Also adjust brightness
      default: true
      selector:
        boolean:

    transition_seconds:
      name: Transition (seconds)
      description: >
        Per-call light transition. With the default 1-minute tick and a
        60s transition, changes feel continuous (no visible step).
      default: 60
      selector:
        number:
          min: 0
          max: 300
          step: 5
          unit_of_measurement: s

    min_change_kelvin:
      name: Minimum Kelvin change to act
      description: >
        Skip a light if the desired Kelvin is within this tolerance of
        its current value. Keep small (e.g. 25 K) for smooth ramps.
      default: 25
      selector:
        number:
          min: 0
          max: 500
          step: 25
          unit_of_measurement: K

    skip_if_recently_changed:
      name: Skip if recently changed (minutes)
      description: >
        If the light was last changed less than N minutes ago (e.g. the
        user grabbed the dimmer), leave it alone. 0 disables the check.
      default: 15
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: min

mode: single
max_exceeded: silent

variables:
  enable_toggle: !input enable_toggle
  excluded_lights: !input excluded_lights
  downlight_label: !input downlight_label
  secondary_label: !input secondary_label
  default_class: !input default_class
  midday_start: !input midday_start
  afternoon_start: !input afternoon_start
  sun_entity: !input sun_entity
  sun_pre_dawn_offset: !input sun_pre_dawn_offset
  sun_morning_offset: !input sun_morning_offset
  sun_evening_offset: !input sun_evening_offset
  sun_night_offset: !input sun_night_offset
  evening_earliest: !input evening_earliest
  evening_latest: !input evening_latest
  night_earliest: !input night_earliest
  night_latest: !input night_latest
  adjust_brightness: !input adjust_brightness
  transition_seconds: !input transition_seconds
  min_change_kelvin: !input min_change_kelvin
  skip_if_recently_changed: !input skip_if_recently_changed

  # Brightness override curve for "downlight" class lights. Kelvin still
  # comes from the per-room preset; only brightness uses this flat curve
  # so primary ceiling lights stay useful through the day and drop only
  # late evening / night. Indexed by anchor name.
  downlight_brightness:
    pre_dawn:  30
    morning:   90
    midday:    100
    afternoon: 100
    evening:   85
    night:     50

  # Room presets: [pre_dawn, morning, midday, afternoon, evening, night]
  # Each value is [Kelvin, brightness%]. Brightness here is used by the
  # "secondary" class. Downlights override brightness with the curve above.
  presets:
    bedroom:
      pre_dawn:  [1900, 10]
      morning:   [3000, 60]
      midday:    [3500, 80]
      afternoon: [3000, 70]
      evening:   [2200, 40]
      night:     [1800, 8]
    bathroom:
      pre_dawn:  [2200, 20]
      morning:   [5000, 90]
      midday:    [5000, 100]
      afternoon: [4000, 80]
      evening:   [2400, 50]
      night:     [1800, 15]
    living:
      pre_dawn:  [2000, 15]
      morning:   [3500, 70]
      midday:    [3500, 90]
      afternoon: [3000, 75]
      evening:   [2400, 50]
      night:     [2000, 20]
    kitchen:
      pre_dawn:  [2400, 25]
      morning:   [4000, 90]
      midday:    [4500, 100]
      afternoon: [3500, 85]
      evening:   [2700, 60]
      night:     [2000, 20]
    dining:
      pre_dawn:  [2200, 15]
      morning:   [2700, 60]
      midday:    [2700, 80]
      afternoon: [2700, 70]
      evening:   [2400, 50]
      night:     [2000, 20]
    office:
      pre_dawn:  [3000, 30]
      morning:   [4500, 90]
      midday:    [5000, 100]
      afternoon: [4000, 85]
      evening:   [3000, 60]
      night:     [2200, 25]
    hallway:
      pre_dawn:  [1800, 8]
      morning:   [3000, 60]
      midday:    [3500, 70]
      afternoon: [3000, 60]
      evening:   [2400, 40]
      night:     [1800, 10]
    staircase:
      pre_dawn:  [1800, 15]
      morning:   [3000, 70]
      midday:    [3500, 80]
      afternoon: [3000, 70]
      evening:   [2400, 50]
      night:     [1800, 15]
    entry:
      pre_dawn:  [2000, 15]
      morning:   [3500, 70]
      midday:    [4000, 90]
      afternoon: [3500, 80]
      evening:   [2700, 60]
      night:     [2000, 20]
    laundry:
      pre_dawn:  [2200, 20]
      morning:   [4000, 90]
      midday:    [4500, 100]
      afternoon: [4000, 90]
      evening:   [2700, 70]
      night:     [2200, 30]
    garage:
      pre_dawn:  [2200, 30]
      morning:   [4000, 90]
      midday:    [5000, 100]
      afternoon: [4000, 100]
      evening:   [3000, 80]
      night:     [2200, 50]
    front_veranda:
      pre_dawn:  [2000, 20]
      morning:   [3500, 70]
      midday:    [4000, 80]
      afternoon: [3500, 70]
      evening:   [2700, 60]
      night:     [2200, 40]
    back_veranda:
      pre_dawn:  [2000, 15]
      morning:   [3000, 60]
      midday:    [3500, 70]
      afternoon: [3000, 60]
      evening:   [2400, 50]
      night:     [2000, 25]
    alfresco:
      pre_dawn:  [2000, 15]
      morning:   [3000, 60]
      midday:    [3500, 70]
      afternoon: [3000, 60]
      evening:   [2400, 50]
      night:     [2000, 25]
    front_yard:
      pre_dawn:  [1800, 25]
      morning:   [3500, 70]
      midday:    [4000, 80]
      afternoon: [3500, 70]
      evening:   [2700, 70]
      night:     [2200, 50]
    backyard:
      pre_dawn:  [1800, 20]
      morning:   [3000, 60]
      midday:    [3500, 70]
      afternoon: [3000, 60]
      evening:   [2400, 50]
      night:     [2000, 25]
    pool:
      pre_dawn:  [2000, 20]
      morning:   [3500, 70]
      midday:    [4000, 80]
      afternoon: [3500, 70]
      evening:   [2700, 60]
      night:     [2200, 35]
    driveway:
      pre_dawn:  [1800, 40]
      morning:   [3500, 80]
      midday:    [4000, 90]
      afternoon: [4000, 80]
      evening:   [3000, 80]
      night:     [2700, 60]
    shed:
      pre_dawn:  [2200, 40]
      morning:   [4000, 90]
      midday:    [5000, 100]
      afternoon: [4500, 95]
      evening:   [3500, 85]
      night:     [2700, 60]

  # --- Time helpers ---
  # midday and afternoon are the only clock-based anchors; the rest
  # come from sun.sun.
  midday_min:    "{{ (midday_start.split(':')[0]    | int) * 60 + (midday_start.split(':')[1]    | int) }}"
  afternoon_min: "{{ (afternoon_start.split(':')[0] | int) * 60 + (afternoon_start.split(':')[1] | int) }}"
  # Brightness clamp clock times (sun-derived evening/night only).
  evening_earliest_min: "{{ (evening_earliest.split(':')[0] | int) * 60 + (evening_earliest.split(':')[1] | int) }}"
  evening_latest_min:   "{{ (evening_latest.split(':')[0]   | int) * 60 + (evening_latest.split(':')[1]   | int) }}"
  night_earliest_min:   "{{ (night_earliest.split(':')[0]   | int) * 60 + (night_earliest.split(':')[1]   | int) }}"
  night_latest_min:     "{{ (night_latest.split(':')[0]     | int) * 60 + (night_latest.split(':')[1]     | int) }}"
  now_min: "{{ now().hour * 60 + now().minute }}"

  # Sun-derived minutes-of-day. We extract the local time-of-day from
  # the `next_*` timestamps; which calendar day they fall on doesn't
  # matter (dawn/dusk drift by only seconds day-to-day). If the
  # attribute is momentarily unavailable, fall back to a sensible
  # hardcoded constant (Sydney-ish; rarely used).
  sun_dawn_min: >-
    {%- set v = state_attr(sun_entity, 'next_dawn') -%}
    {%- if v is not none -%}
      {%- set lt = as_timestamp(v) | timestamp_custom('%H:%M', true) -%}
      {{ (lt.split(':')[0] | int) * 60 + (lt.split(':')[1] | int) }}
    {%- else -%}330{%- endif -%}
  sun_rising_min: >-
    {%- set v = state_attr(sun_entity, 'next_rising') -%}
    {%- if v is not none -%}
      {%- set lt = as_timestamp(v) | timestamp_custom('%H:%M', true) -%}
      {{ (lt.split(':')[0] | int) * 60 + (lt.split(':')[1] | int) }}
    {%- else -%}390{%- endif -%}
  sun_setting_min: >-
    {%- set v = state_attr(sun_entity, 'next_setting') -%}
    {%- if v is not none -%}
      {%- set lt = as_timestamp(v) | timestamp_custom('%H:%M', true) -%}
      {{ (lt.split(':')[0] | int) * 60 + (lt.split(':')[1] | int) }}
    {%- else -%}1110{%- endif -%}
  sun_dusk_min: >-
    {%- set v = state_attr(sun_entity, 'next_dusk') -%}
    {%- if v is not none -%}
      {%- set lt = as_timestamp(v) | timestamp_custom('%H:%M', true) -%}
      {{ (lt.split(':')[0] | int) * 60 + (lt.split(':')[1] | int) }}
    {%- else -%}1140{%- endif -%}

  # Effective anchors. pre_dawn / morning / evening / night are always
  # sun-derived (with per-anchor offsets). midday and afternoon stay
  # clock-based.
  pre_dawn_min: >-
    {{ ((sun_dawn_min   | int) + (sun_pre_dawn_offset | int)) % 1440 }}
  morning_min: >-
    {{ ((sun_rising_min | int) + (sun_morning_offset  | int)) % 1440 }}
  # Sun-derived raw values (before any brightness clamp).
  evening_sun_raw: >-
    {{ ((sun_setting_min | int) + (sun_evening_offset | int)) % 1440 }}
  night_sun_raw: >-
    {{ ((sun_dusk_min    | int) + (sun_night_offset   | int)) % 1440 }}

  # --- KELVIN anchors: raw sun position, no clamp. ---
  # Best-practice circadian response: warm light arrives with the
  # actual sunset, regardless of clock.
  evening_min_k: "{{ evening_sun_raw | int }}"
  night_min_k:   "{{ night_sun_raw   | int }}"

  # --- BRIGHTNESS anchors: sun-derived but clamped between the
  # configured earliest/latest clock floors/ceilings, so the dim-down
  # doesn't kick in mid-afternoon in winter or push past midnight in
  # summer. Kelvin and brightness are interpolated independently. ---
  evening_min_b: >-
    {{ [[evening_sun_raw | int, evening_earliest_min | int] | max,
        evening_latest_min | int] | min }}
  night_min_b: >-
    {{ [[night_sun_raw   | int, night_earliest_min   | int] | max,
        night_latest_min   | int] | min }}

  # Area -> room-type mapping driven by the inputs.
  area_to_room:
    bedroom: !input bedroom_areas
    bathroom: !input bathroom_areas
    living: !input living_areas
    kitchen: !input kitchen_areas
    dining: !input dining_areas
    office: !input office_areas
    hallway: !input hallway_areas
    staircase: !input staircase_areas
    entry: !input entry_areas
    laundry: !input laundry_areas
    garage: !input garage_areas
    front_veranda: !input front_veranda_areas
    back_veranda: !input back_veranda_areas
    alfresco: !input alfresco_areas
    front_yard: !input front_yard_areas
    backyard: !input backyard_areas
    pool: !input pool_areas
    driveway: !input driveway_areas
    shed: !input shed_areas

  # Build [{entity, room}, ...] from the mapping. Filters out excluded
  # lights, lights without color-temp support, and unavailable lights.
  # Earlier room-type entries win on duplicates.
  targets: >-
    {%- set ns = namespace(out=[], seen=[]) -%}
    {%- for room, areas in area_to_room.items() -%}
      {%- for area in areas -%}
        {%- for e in area_entities(area) -%}
          {%- if e.startswith('light.')
                 and e not in excluded_lights
                 and e not in ns.seen
                 and states(e) not in ['unavailable', 'unknown'] -%}
            {%- set modes = state_attr(e, 'supported_color_modes') or [] -%}
            {%- if 'color_temp' in modes
                   or state_attr(e, 'min_color_temp_kelvin') is not none -%}
              {%- set ns.seen = ns.seen + [e] -%}
              {%- set ns.out = ns.out + [{'entity': e, 'room': room}] -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
    {%- endfor -%}
    {{ ns.out }}

trigger:
  # Steady cadence — drives the interpolation. Every tick nudges each
  # on-light a small step toward the next anchor's values.
  - platform: time_pattern
    minutes: "/1"

condition:
  - condition: state
    entity_id: !input enable_toggle
    state: "on"

action:
  - repeat:
      for_each: "{{ targets }}"
      sequence:
        - variables:
            ent: "{{ repeat.item.entity }}"
            room: "{{ repeat.item.room }}"

            # --- Two parallel anchor lists ---
            # Kelvin tracks raw sun position (best-practice circadian).
            # Brightness uses sun-derived but clock-clamped evening/night
            # times so the dim-down doesn't kick in mid-afternoon in
            # winter. pre_dawn/morning/midday/afternoon are shared.
            # Each entry: [minutes, slot_name, [Kelvin, secondary_brightness%]].
            anchors_k: >-
              {{ [
                [pre_dawn_min   | int, 'pre_dawn',  presets[room]['pre_dawn']],
                [morning_min    | int, 'morning',   presets[room]['morning']],
                [midday_min     | int, 'midday',    presets[room]['midday']],
                [afternoon_min  | int, 'afternoon', presets[room]['afternoon']],
                [evening_min_k  | int, 'evening',   presets[room]['evening']],
                [night_min_k    | int, 'night',     presets[room]['night']],
              ] }}
            anchors_b: >-
              {{ [
                [pre_dawn_min   | int, 'pre_dawn',  presets[room]['pre_dawn']],
                [morning_min    | int, 'morning',   presets[room]['morning']],
                [midday_min     | int, 'midday',    presets[room]['midday']],
                [afternoon_min  | int, 'afternoon', presets[room]['afternoon']],
                [evening_min_b  | int, 'evening',   presets[room]['evening']],
                [night_min_b    | int, 'night',     presets[room]['night']],
              ] }}

            # --- Fixture class from HA labels ---
            ent_labels: "{{ labels(ent) | default([]) | list }}"
            fixture_class: >-
              {%- if downlight_label in ent_labels -%}downlight
              {%- elif secondary_label in ent_labels -%}secondary
              {%- else -%}{{ default_class }}
              {%- endif -%}

            # Find prev/next anchors around now_min for the KELVIN list,
            # wrapping at midnight. If now is before the first anchor or
            # after the last, the bracketing pair is (last, first+1440).
            prev_idx_k: >-
              {%- set ns = namespace(idx=-1) -%}
              {%- for a in anchors_k -%}
                {%- if (now_min | int) >= a[0] -%}
                  {%- set ns.idx = loop.index0 -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.idx }}
            prev_ak: >-
              {{ anchors_k[(prev_idx_k | int)] if (prev_idx_k | int) >= 0
                 else anchors_k[anchors_k|length - 1] }}
            next_ak: >-
              {{ anchors_k[(prev_idx_k | int) + 1] if (prev_idx_k | int) >= 0
                    and (prev_idx_k | int) + 1 < anchors_k|length
                 else anchors_k[0] }}
            prev_min_k: "{{ prev_ak[0] | int }}"
            next_min_k_raw: "{{ next_ak[0] | int }}"
            next_min_k: >-
              {{ next_min_k_raw if (next_min_k_raw | int) > (prev_min_k | int)
                 else (next_min_k_raw | int) + 1440 }}
            eff_now_k: >-
              {{ (now_min | int) if (now_min | int) >= (prev_min_k | int)
                 else (now_min | int) + 1440 }}
            span_k: "{{ ((next_min_k | int) - (prev_min_k | int)) | int }}"
            frac_k: >-
              {{ 0 if (span_k | int) <= 0
                 else (((eff_now_k | int) - (prev_min_k | int)) / (span_k | int)) }}
            frac_k_clamped: "{{ [[frac_k | float, 0] | max, 1] | min }}"

            # Same prev/next/frac calculation for the BRIGHTNESS list.
            prev_idx_b: >-
              {%- set ns = namespace(idx=-1) -%}
              {%- for a in anchors_b -%}
                {%- if (now_min | int) >= a[0] -%}
                  {%- set ns.idx = loop.index0 -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.idx }}
            prev_ab: >-
              {{ anchors_b[(prev_idx_b | int)] if (prev_idx_b | int) >= 0
                 else anchors_b[anchors_b|length - 1] }}
            next_ab: >-
              {{ anchors_b[(prev_idx_b | int) + 1] if (prev_idx_b | int) >= 0
                    and (prev_idx_b | int) + 1 < anchors_b|length
                 else anchors_b[0] }}
            prev_min_b: "{{ prev_ab[0] | int }}"
            next_min_b_raw: "{{ next_ab[0] | int }}"
            next_min_b: >-
              {{ next_min_b_raw if (next_min_b_raw | int) > (prev_min_b | int)
                 else (next_min_b_raw | int) + 1440 }}
            eff_now_b: >-
              {{ (now_min | int) if (now_min | int) >= (prev_min_b | int)
                 else (now_min | int) + 1440 }}
            span_b: "{{ ((next_min_b | int) - (prev_min_b | int)) | int }}"
            frac_b: >-
              {{ 0 if (span_b | int) <= 0
                 else (((eff_now_b | int) - (prev_min_b | int)) / (span_b | int)) }}
            frac_b_clamped: "{{ [[frac_b | float, 0] | max, 1] | min }}"

            # Kelvin interpolated against the (sun-driven) kelvin anchors.
            target_kelvin: >-
              {{ ((prev_ak[2][0] | int)
                  + ((next_ak[2][0] | int) - (prev_ak[2][0] | int))
                    * (frac_k_clamped | float)) | round(0) | int }}
            # Brightness interpolated against the (clock-clamped)
            # brightness anchors, so winter sunsets don't dim too early.
            target_brightness_pct: >-
              {%- if fixture_class == 'downlight' -%}
                {{ ((downlight_brightness[prev_ab[1]] | int)
                    + ((downlight_brightness[next_ab[1]] | int)
                       - (downlight_brightness[prev_ab[1]] | int))
                      * (frac_b_clamped | float)) | round(0) | int }}
              {%- else -%}
                {{ ((prev_ab[2][1] | int)
                    + ((next_ab[2][1] | int) - (prev_ab[2][1] | int))
                      * (frac_b_clamped | float)) | round(0) | int }}
              {%- endif -%}

            is_on: "{{ states(ent) == 'on' }}"
            current_kelvin: >-
              {{ state_attr(ent, 'color_temp_kelvin')
                 | default(state_attr(ent, 'kelvin'), true)
                 | default(0, true) | int(0) }}
            min_k: "{{ state_attr(ent, 'min_color_temp_kelvin') | default(2000, true) | int(2000) }}"
            max_k: "{{ state_attr(ent, 'max_color_temp_kelvin') | default(6500, true) | int(6500) }}"
            clamped_kelvin: "{{ [[target_kelvin, min_k] | max, max_k] | min }}"
            kelvin_delta: "{{ (clamped_kelvin - current_kelvin) | abs }}"
            last_changed_minutes: >-
              {{ ((now() - states[ent.split('.')[0]][ent.split('.')[1]].last_changed)
                  .total_seconds() / 60) | round(0) if is_on else 9999 }}
            recently_touched: >-
              {{ skip_if_recently_changed | int > 0
                 and last_changed_minutes < (skip_if_recently_changed | int) }}
        - choose:
            - conditions:
                - "{{ is_on }}"
                - "{{ not recently_touched }}"
                - "{{ kelvin_delta > (min_change_kelvin | int)
                      or (adjust_brightness and target_brightness_pct > 0) }}"
              sequence:
                - choose:
                    - conditions: "{{ adjust_brightness }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: "{{ ent }}"
                          data:
                            color_temp_kelvin: "{{ clamped_kelvin }}"
                            brightness_pct: "{{ target_brightness_pct }}"
                            transition: "{{ transition_seconds | int }}"
                  default:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ ent }}"
                      data:
                        color_temp_kelvin: "{{ clamped_kelvin }}"
                        transition: "{{ transition_seconds | int }}"

